<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather and Time</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body onload="loadTimeInfo()">
    <header>
        <h1>Horario e Clima</h1>
    </header>

    <section id="hora">

        <div id = "msg"> </div>

        <div id = "img">
            <img id="imagem" src="imagesWeather/leonardoPaisagemManh0.WebP" alt="Foto do Dia">
        </div>

    </section>

    <!-- Busca Temperatura e velocidade do vento -->
    <section id="clima">
        <div>
            <p>Clique no botão para verificar o clima em Itapecuru Mirim:</p>
            <button onclick="searchWeather()">Verificar Clima de Itapecuru Mirim</button>
        </div>

        <div id="resultado">
            <p>Resultado:</p>
        </div>
    </section>

    <div id="button">
        <button id="voltar"><a href="../index.html">Voltar</a></button>
    </div>
    
    <footer>
        <p>&copy;PedroVitor</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
